<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Swiggy Clone</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fc8019 0%, #ff6b35 100%);
        }

        .auth-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.2);
        }

        .auth-logo {
            text-align: center;
            font-size: 34px;
            font-weight: 800;
            color: var(--orange);
            margin-bottom: 6px;
        }

        .auth-subtitle {
            text-align: center;
            color: var(--gray);
            margin-bottom: 28px;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            background: #f4f4f5;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: var(--gray);
            transition: all 0.2s;
        }

        .tab.active {
            background: white;
            color: var(--orange);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .form-group { margin-bottom: 14px; }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #1c1c1c;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #eee;
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            color: #1c1c1c;
        }

        .form-group input:focus { border-color: var(--orange); }

        .submit-btn {
            width: 100%;
            background: var(--orange);
            color: white;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            margin-top: 6px;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }

        .submit-btn:hover { background: #e5720f; }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

        .guest-btn {
            width: 100%;
            background: #f4f4f5;
            color: #686b78;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 10px;
            border: none;
            cursor: pointer;
        }

        .msg {
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 14px;
            display: none;
            font-weight: 500;
        }

        .msg.error { background: #ffeaea; color: #e23744; display: block; }
        .msg.success { background: #eafff3; color: #48c479; display: block; }

        .divider {
            text-align: center;
            color: var(--gray);
            font-size: 13px;
            margin: 14px 0;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">🍔 swiggy</div>
        <p class="auth-subtitle">Delicious food, delivered fast</p>

        <div class="tabs">
            <div class="tab active" id="login-tab" onclick="switchTab('login')">Login</div>
            <div class="tab" id="signup-tab" onclick="switchTab('signup')">Sign Up</div>
        </div>

        <div id="msg" class="msg"></div>

        <!-- Login Form -->
        <div id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="Enter your email" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter your password" />
            </div>
            <button class="submit-btn" id="login-btn" onclick="handleLogin()">Login 🚀</button>
        </div>

        <!-- Signup Form -->
        <div id="signup-form" style="display:none">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="signup-name" placeholder="Enter your full name" />
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signup-email" placeholder="Enter your email" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signup-password" placeholder="Min 6 characters" />
            </div>
            <button class="submit-btn" id="signup-btn" onclick="handleSignup()">Create Account 🎉</button>
        </div>

        <div class="divider">── or ──</div>
        <button class="guest-btn" onclick="window.location.href='index.html'">👤 Continue as Guest</button>
    </div>

    <script>
        const BASE_URL = '';

        function showMsg(text, type) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = 'msg ' + type;
        }

        function hideMsg() {
            const el = document.getElementById('msg');
            el.className = 'msg';
            el.textContent = '';
        }

        function switchTab(tab) {
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
            document.getElementById('login-tab').classList.toggle('active', tab === 'login');
            document.getElementById('signup-tab').classList.toggle('active', tab === 'signup');
            hideMsg();
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if (!email || !password) return showMsg('Please fill in all fields.', 'error');

            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.textContent = 'Logging in...';

            try {
                const res = await fetch(BASE_URL + '/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (data.error) {
                    showMsg(data.error, 'error');
                } else {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showMsg('Login successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = 'index.html', 1000);
                }
            } catch (e) {
                showMsg('Cannot connect to server. Make sure backend is running.', 'error');
            }

            btn.disabled = false;
            btn.textContent = 'Login 🚀';
        }

        async function handleSignup() {
            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value.trim();

            if (!name || !email || !password) return showMsg('Please fill in all fields.', 'error');
            if (password.length < 6) return showMsg('Password must be at least 6 characters.', 'error');

            const btn = document.getElementById('signup-btn');
            btn.disabled = true;
            btn.textContent = 'Creating account...';

            try {
                const res = await fetch(BASE_URL + '/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();

                if (data.error) {
                    showMsg(data.error, 'error');
                } else {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showMsg('Account created! Redirecting...', 'success');
                    setTimeout(() => window.location.href = 'index.html', 1000);
                }
            } catch (e) {
                showMsg('Cannot connect to server. Make sure backend is running.', 'error');
            }

            btn.disabled = false;
            btn.textContent = 'Create Account 🎉';
        }

        // Redirect if already logged in
        if (localStorage.getItem('user')) window.location.href = 'index.html';
    </script>
</body>
</html>
